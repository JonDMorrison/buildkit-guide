name: E2E Tests

on:
  pull_request:
    paths:
      - 'src/pages/Safety.tsx'
      - 'src/components/safety/**'
      - 'src/lib/recordHash.ts'
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
      - 'e2e/**'
      - 'playwright.config.ts'
      - 'package.json'
  push:
    branches:
      - main
    paths:
      - 'src/pages/Safety.tsx'
      - 'src/components/safety/**'
      - 'src/lib/recordHash.ts'
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
      - 'e2e/**'
      - 'playwright.config.ts'
      - 'package.json'

jobs:
  e2e-tests:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      # Cache Playwright browsers for faster runs
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(npm ls @playwright/test --json | jq -r '.dependencies["@playwright/test"].version')" >> $GITHUB_OUTPUT
      
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
      
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      
      - name: Install Playwright dependencies (if cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      
      - name: Run E2E tests
        run: npm run test:e2e
        env:
          # REQUIRED: E2E guardrails
          E2E_ENV: test
          
          # Supabase configuration
          # VITE_ vars fall back to dummy values so the dev server can start for smoke tests.
          # Override with real secrets to run tests against a live Supabase instance.
          PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://dummy.supabase.co' }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'dummy-key' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      
      # Upload ALL artifacts on failure
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
      
      - name: Upload test traces
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: test-results/**/*.zip
          retention-days: 14
      
      - name: Upload failure screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: failure-screenshots
          path: test-results/**/*.png
          retention-days: 14
      
      - name: Upload test videos
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-videos
          path: test-results/**/*.webm
          retention-days: 7
      
      # Always upload test results summary
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-summary
          path: |
            test-results/
            !test-results/**/*.webm
            !test-results/**/*.zip
          retention-days: 7